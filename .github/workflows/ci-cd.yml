name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        # Cài dependencies của dự án trong GR_B6-Day-3-Lab-Chatbot-vs-react-agent
        if [ -f GR_B6-Day-3-Lab-Chatbot-vs-react-agent/requirements.txt ]; then pip install -r GR_B6-Day-3-Lab-Chatbot-vs-react-agent/requirements.txt; fi

    - name: Lint with flake8
      run: |
        # check syntax errors or undefined names
        flake8 GR_B6-Day-3-Lab-Chatbot-vs-react-agent/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 GR_B6-Day-3-Lab-Chatbot-vs-react-agent/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Production Readiness checks
      env:
        PYTHONPATH: ./GR_B6-Day-3-Lab-Chatbot-vs-react-agent
      run: |
        python GR_B6-Day-3-Lab-Chatbot-vs-react-agent/check_production_ready.py

  cd:
    name: Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Railway CLI
      run: npm i -g @railway/cli

    - name: Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if [ -z "$RAILWAY_TOKEN" ]; then
          echo "WARNING: RAILWAY_TOKEN is not set. Skipping deployment stage."
        else
          # Triển khai thư mục code hoàn chỉnh lên Railway
          railway up --service day12-production-agent --detach --path GR_B6-Day-3-Lab-Chatbot-vs-react-agent
        fi
